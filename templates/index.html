{% extends "base.html" %}
{% block title %}WalkWars · 開始新遊戲{% endblock %}
{% block content %}
  {% if error %}<p class="error">⚠ {{ error }}</p>{% endif %}

  <form method="post" action="{{ url_for('new_game') }}">
    <label>
      起點地名
      <input type="text" name="origin" value="{{ default_origin }}" required autofocus>
    </label>
    <button type="submit">開始遊戲</button>
  </form>

  <p class="hint">
    系統會在起點 1.5 公里內生成 20~25 個地點，第一次啟動會花約 60 秒建步行時間表，
    之後同一起點走 cache 秒開。
  </p>
{% endblock %}
